name: test

# Runs on every PR and every push to main. The production deploy is a
# separate flow (post-receive hook on the DO droplet) — this just gates
# code review with the unit + contract + generative test suite.

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands —
# saves CI minutes on rapid iterations.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Force NODE_ENV so any test infrastructure that branches on it
          # picks the right config. Production handlers don't read this,
          # but our test mocks may.
          NODE_ENV: test
          # The Discord-guild integration suite skips itself when these
          # aren't set — we don't want CI to depend on a separate test
          # bot or guild creds. Locally / on-demand only.
          # DISCORD_TEST_BOT_TOKEN: not set on purpose
          # DISCORD_TEST_GUILD_ID: not set on purpose
